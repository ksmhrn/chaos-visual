<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
</head>
<body>
<script>
let t = 0;

function setup() {
  createCanvas(window.innerWidth, window.innerHeight);
  background(0);
}

function draw() {
  background(0, 20);
  translate(width/2, height/2);

  stroke(255);
  noFill();
  beginShape();
  for (let a = 0; a < TWO_PI; a += 0.01) {
    let r = 200 + 100 * noise(cos(a)+1, sin(a)+1, t);
    let x = r * cos(a);
    let y = r * sin(a);
    vertex(x, y);
  }
  endShape(CLOSE);

  t += 0.01;
}
</script>
</body>
</html>
